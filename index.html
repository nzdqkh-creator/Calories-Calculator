<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calorie Calculator</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#3b82f6">

<style>

* {
    box-sizing: border-box;
    font-family: system-ui, sans-serif;
}

body {
    margin: 0;
    padding: 12px;
    background: #f1f5f9;
}

.app {
    max-width: 420px;
    margin: auto;
    background: white;
    padding: 16px;
    border-radius: 24px;
}

h1 {
    margin: 0 0 12px;
    font-size: 22px;
}

/* Buttons */

button,
.upload {
    width: 100%;
    padding: 12px;
    border: 0;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
}

.upload {
    display: block;
    text-align: center;
    background: #3b82f6;
    color: white;
    margin-bottom: 10px;
}

.clear {
    background: #ef4444;
    color: white;
    margin-top: 10px;
}

/* Filter */

#filter {
    width: 100%;
    padding: 12px;
    border: 1px solid #ddd;
    border-radius: 12px;
    font-size: 16px;
}

/* Food Liste */

.list {
    margin-top: 10px;
    max-height: 200px;
    overflow-y: auto;
}

.list div {
    padding: 12px;
    margin-bottom: 5px;
    background: #f1f5f9;
    border-radius: 10px;
    cursor: pointer;
}

.list div.selected {
    background: #dbeafe;
    border: 2px solid #3b82f6;
}

/* Track Button */

#trackBtn {
    margin-top: 10px;
    background: #3b82f6;
    color: white;
}

/* Report */

.report {
    margin-top: 20px;
}

.report div {
    display: flex;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid #eee;
}

/* Tracked */

.tracked {
    margin-top: 20px;
}

.tracked div {
    display: flex;
    justify-content: space-between;
    padding: 10px;
    margin-bottom: 5px;
    background: #f1f5f9;
    border-radius: 10px;
}

.remove {
    width: auto;
    padding: 2px 8px;
    background: none;
    color: #999;
}

input[type="file"] {
    display: none;
}

</style>
</head>

<body>

<div class="app">

<h1>Calorie Calculator</h1>

<!-- Excel Import -->

<label class="upload" for="fileInput">
    Import Excel
</label>

<input
    type="file"
    id="fileInput"
    accept=".xlsx,.xls"
>

<!-- Food Filter -->

<input
    id="filter"
    type="text"
    placeholder="Food filtern..."
>

<!-- Food Liste -->

<div id="foodList" class="list"></div>

<!-- Track -->

<button id="trackBtn">
    Track Food
</button>

<!-- Macro Report -->

<div class="report">

    <div>
        <span>Energy</span>
        <span id="energy">0 kcal</span>
    </div>

    <div>
        <span>Fat</span>
        <span id="fat">0 g</span>
    </div>

    <div>
        <span>SFA</span>
        <span id="sfa">0 g</span>
    </div>

    <div>
        <span>Carbohydrate</span>
        <span id="carb">0 g</span>
    </div>

    <div>
        <span>Sugar</span>
        <span id="sugar">0 g</span>
    </div>

    <div>
        <span>Fiber</span>
        <span id="fiber">0 g</span>
    </div>

    <div>
        <span>Protein</span>
        <span id="protein">0 g</span>
    </div>

</div>

<!-- Getrackte Foods -->

<div class="tracked">

    <h3>Tracked Food</h3>

    <div id="trackedList"></div>

</div>

<!-- Alles löschen -->

<button id="clearBtn" class="clear">
    Clear Cash
</button>

</div>


<script src="xlsx.full.min.js"></script>

<script>

let food = [
    {
        Food: "Apfel",
        Energy: 52,
        Fat: 0.2,
        SFA: 0,
        Carb: 14,
        Sugar: 10,
        Fiber: 2.4,
        Protein: 0.3
    },

    {
        Food: "Banane",
        Energy: 89,
        Fat: 0.3,
        SFA: 0.1,
        Carb: 23,
        Sugar: 12,
        Fiber: 2.6,
        Protein: 1.1
    },

    {
        Food: "Vollkornbrot",
        Energy: 265,
        Fat: 4.2,
        SFA: 0.6,
        Carb: 43,
        Sugar: 5,
        Fiber: 7,
        Protein: 9
    }
];

let tracked = JSON.parse(
    localStorage.getItem("tracked") || "[]"
);

let selected = null;


/* -------------------------
   FOOD LIST
------------------------- */

function renderFood() {

    const search =
        document
        .getElementById("filter")
        .value
        .toLowerCase();

    const list =
        document.getElementById("foodList");

    const result =
        food.filter(x =>
            x.Food
            .toLowerCase()
            .includes(search)
        );

    list.innerHTML = "";

    result.forEach(item => {

        const div =
            document.createElement("div");

        div.textContent = item.Food;

        if (selected === item) {
            div.classList.add("selected");
        }

        div.onclick = () => {

            selected = item;

            renderFood();

        };

        list.appendChild(div);

    });

}


/* -------------------------
   TRACK FOOD
------------------------- */

document
.getElementById("trackBtn")
.onclick = function() {

    if (!selected) {

        alert("Bitte Food auswählen");

        return;

    }

    const amount =
        prompt(
            "Menge in Gramm:",
            "100"
        );

    if (!amount) return;

    const grams =
        parseFloat(amount);

    if (
        isNaN(grams) ||
        grams <= 0
    ) {

        alert("Ungültige Menge");

        return;

    }

    const factor =
        grams / 100;

    tracked.push({

        Food: selected.Food,

        grams: grams,

        Energy:
            selected.Energy * factor,

        Fat:
            selected.Fat * factor,

        SFA:
            selected.SFA * factor,

        Carb:
            selected.Carb * factor,

        Sugar:
            selected.Sugar * factor,

        Fiber:
            selected.Fiber * factor,

        Protein:
            selected.Protein * factor

    });

    save();

    renderTracked();

    renderReport();

};


/* -------------------------
   TRACKED FOOD
------------------------- */

function renderTracked() {

    const list =
        document.getElementById(
            "trackedList"
        );

    list.innerHTML = "";

    tracked.forEach(
        (item, index) => {

            const div =
                document.createElement("div");

            div.innerHTML = `

                <span>
                    ${item.Food}
                    (${item.grams} g)
                </span>

                <button
                    class="remove"
                    onclick="removeTracked(${index})"
                >
                    ×
                </button>

            `;

            list.appendChild(div);

        }
    );

}


function removeTracked(index) {

    tracked.splice(index, 1);

    save();

    renderTracked();

    renderReport();

}


/* -------------------------
   MACRO REPORT
------------------------- */

function renderReport() {

    const total = {

        Energy: 0,
        Fat: 0,
        SFA: 0,
        Carb: 0,
        Sugar: 0,
        Fiber: 0,
        Protein: 0

    };

    tracked.forEach(item => {

        Object.keys(total)
        .forEach(key => {

            total[key] +=
                item[key] || 0;

        });

    });


    document
    .getElementById("energy")
    .textContent =
        Math.round(total.Energy)
        + " kcal";


    document
    .getElementById("fat")
    .textContent =
        total.Fat.toFixed(1)
        + " g";


    document
    .getElementById("sfa")
    .textContent =
        total.SFA.toFixed(1)
        + " g";


    document
    .getElementById("carb")
    .textContent =
        total.Carb.toFixed(1)
        + " g";


    document
    .getElementById("sugar")
    .textContent =
        total.Sugar.toFixed(1)
        + " g";


    document
    .getElementById("fiber")
    .textContent =
        total.Fiber.toFixed(1)
        + " g";


    document
    .getElementById("protein")
    .textContent =
        total.Protein.toFixed(1)
        + " g";

}


/* -------------------------
   EXCEL IMPORT
------------------------- */

document
.getElementById("fileInput")
.onchange = function() {

    const file =
        this.files[0];

    if (!file) return;

    const reader =
        new FileReader();

    reader.onload =
        function(e) {

            const workbook =
                XLSX.read(
                    e.target.result,
                    {
                        type: "array"
                    }
                );

            const sheet =
                workbook.Sheets[
                    workbook.SheetNames[0]
                ];

            food =
                XLSX
                .utils
                .sheet_to_json(sheet)
                .map(row => ({

                    Food:
                        row.Food,

                    Energy:
                        Number(
                            row.Energy ||
                            row.Energie ||
                            0
                        ),

                    Fat:
                        Number(row.Fat || 0),

                    SFA:
                        Number(row.SFA || 0),

                    Carb:
                        Number(
                            row.Carb || 0
                        ),

                    Sugar:
                        Number(
                            row.Sugar || 0
                        ),

                    Fiber:
                        Number(
                            row.Fiber || 0
                        ),

                    Protein:
                        Number(
                            row.Protein || 0
                        )

                }));

            renderFood();

        };

    reader.readAsArrayBuffer(file);

};


/* -------------------------
   FILTER
------------------------- */

document
.getElementById("filter")
.oninput =
    renderFood;


/* -------------------------
   CLEAR CACHE
------------------------- */

document
.getElementById("clearBtn")
.onclick = function() {

    if (
        confirm(
            "Alle App-Daten löschen?"
        )
    ) {

        localStorage.clear();

        tracked = [];

        location.reload();

    }

};


/* -------------------------
   SAVE
------------------------- */

function save() {

    localStorage.setItem(
        "tracked",
        JSON.stringify(tracked)
    );

}


/* -------------------------
   START
------------------------- */

renderFood();

renderTracked();

renderReport();


/* -------------------------
   SERVICE WORKER
------------------------- */

if (
    "serviceWorker"
    in navigator
) {

    navigator
    .serviceWorker
    .register("sw.js");

}

</script>

</body>
</html>
