<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
>

<title>Calorie Calculator</title>

<link rel="manifest" href="./manifest.json">

<meta
    name="theme-color"
    content="#3b82f6"
>

<style>

/* =========================
   BASIC
========================= */

* {
    box-sizing: border-box;
    font-family: system-ui, sans-serif;
}

body {
    margin: 0;
    padding: 12px;
    background: #f1f5f9;
}

.app {
    width: 100%;
    max-width: 420px;
    margin: auto;
    background: white;
    padding: 16px;
    border-radius: 24px;
}

h1 {
    margin: 0 0 16px 0;
    font-size: 22px;
}


/* =========================
   EXCEL IMPORT
========================= */

.upload {
    display: block;
    width: 100%;
    padding: 12px;
    background: #3b82f6;
    color: white;
    text-align: center;
    border-radius: 12px;
    font-weight: 600;
    cursor: pointer;
    margin-bottom: 10px;
}

#fileInput {
    display: none;
}


/* =========================
   FILTER
========================= */

#filter {

    width: 100%;

    padding: 12px;

    border: 1px solid #d1d5db;

    border-radius: 12px;

    font-size: 16px;

    outline: none;

}

#filter:focus {

    border-color: #3b82f6;

}


/* =========================
   FOOD LIST
========================= */

.food-list {

    margin-top: 10px;

    max-height: 220px;

    overflow-y: auto;

}

.food-item {

    display: flex;

    justify-content: space-between;

    align-items: center;

    padding: 12px;

    margin-bottom: 5px;

    background: #f1f5f9;

    border-radius: 10px;

    cursor: pointer;

}

.food-item.selected {

    background: #dbeafe;

    border: 2px solid #3b82f6;

}

.food-energy {

    font-size: 13px;

    color: #64748b;

}


/* =========================
   TRACK BUTTON
========================= */

#trackBtn {

    width: 100%;

    padding: 12px;

    margin-top: 10px;

    border: none;

    border-radius: 12px;

    background: #3b82f6;

    color: white;

    font-size: 16px;

    font-weight: 600;

    cursor: pointer;

}


/* =========================
   REPORT
========================= */

.report {

    margin-top: 20px;

}

.report-title {

    font-size: 18px;

    font-weight: 700;

    margin-bottom: 8px;

}

.macro {

    display: flex;

    justify-content: space-between;

    padding: 8px 0;

    border-bottom: 1px solid #e5e7eb;

}


/* =========================
   TRACKED FOOD
========================= */

.tracked {

    margin-top: 20px;

}

.tracked-title {

    font-size: 18px;

    font-weight: 700;

    margin-bottom: 8px;

}

.tracked-item {

    display: flex;

    justify-content: space-between;

    align-items: center;

    padding: 10px;

    margin-bottom: 5px;

    background: #f1f5f9;

    border-radius: 10px;

}

.remove {

    border: none;

    background: none;

    color: #94a3b8;

    font-size: 18px;

    cursor: pointer;

}


/* =========================
   CLEAR CACHE
========================= */

#clearBtn {

    width: 100%;

    padding: 12px;

    margin-top: 20px;

    border: none;

    border-radius: 12px;

    background: #ef4444;

    color: white;

    font-size: 16px;

    font-weight: 600;

    cursor: pointer;

}

</style>

</head>


<body>


<div class="app">


<h1>
Calorie Calculator
</h1>


<!-- =========================
     EXCEL IMPORT
========================= -->

<label
    class="upload"
    for="fileInput"
>
    Import Excel
</label>

<input
    type="file"
    id="fileInput"
    accept=".xlsx,.xls"
>


<!-- =========================
     FOOD FILTER
========================= -->

<input
    type="text"
    id="filter"
    placeholder="Food filtern..."
>


<!-- =========================
     FOOD LIST
========================= -->

<div
    id="foodList"
    class="food-list"
>
</div>


<!-- =========================
     TRACK
========================= -->

<button id="trackBtn">
    Track Food
</button>


<!-- =========================
     MACRO REPORT
========================= -->

<div class="report">

    <div class="report-title">
        Report
    </div>


    <div class="macro">

        <span>
            Energy
        </span>

        <span id="energy">
            0 kcal
        </span>

    </div>


    <div class="macro">

        <span>
            Fat
        </span>

        <span id="fat">
            0 g
        </span>

    </div>


    <div class="macro">

        <span>
            SFA
        </span>

        <span id="sfa">
            0 g
        </span>

    </div>


    <div class="macro">

        <span>
            Carbs
        </span>

        <span id="carbs">
            0 g
        </span>

    </div>


    <div class="macro">

        <span>
            Sugar
        </span>

        <span id="sugar">
            0 g
        </span>

    </div>


    <div class="macro">

        <span>
            Fiber
        </span>

        <span id="fiber">
            0 g
        </span>

    </div>


    <div class="macro">

        <span>
            Protein
        </span>

        <span id="protein">
            0 g
        </span>

    </div>

</div>


<!-- =========================
     TRACKED FOOD
========================= -->

<div class="tracked">

    <div class="tracked-title">
        Tracked Food
    </div>

    <div id="trackedList">
    </div>

</div>


<!-- =========================
     CLEAR ALL CACHE
========================= -->

<button id="clearBtn">
    Clear Cash
</button>


</div>


<!-- =========================
     XLSX LIBRARY
     Excel-Dateien lesen
========================= -->

<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>


<script>


/* =====================================================
   FOOD DATABASE
===================================================== */

let food = [];


/* =====================================================
   TRACKED FOOD
===================================================== */

let tracked = [];


/* =====================================================
   SELECTED FOOD
===================================================== */

let selectedFood = null;


/* =====================================================
   LOAD TRACKED FOOD
===================================================== */

try {

    const saved =
        localStorage.getItem(
            "trackedFood"
        );

    if (saved) {

        tracked =
            JSON.parse(saved);

    }

}
catch (error) {

    tracked = [];

}


/* =====================================================
   EXCEL IMPORT
===================================================== */

document
.getElementById("fileInput")
.addEventListener(
    "change",
    function () {


        const file =
            this.files[0];


        if (!file) {

            return;

        }


        const reader =
            new FileReader();


        reader.onload =
            function (event) {


                try {


                    /* ---------------------------------
                       EXCEL DATEI LESEN
                    --------------------------------- */

                    const workbook =
                        XLSX.read(
                            new Uint8Array(
                                event.target.result
                            ),
                            {
                                type: "array"
                            }
                        );


                    /* ---------------------------------
                       SHEET DMACROS HOLEN
                    --------------------------------- */

                    const sheet =
                        workbook.Sheets[
                            "DMacros"
                        ];


                    if (!sheet) {

                        alert(
                            'Fehler: Das Sheet "DMacros" wurde nicht gefunden.'
                        );

                        return;

                    }


                    /* ---------------------------------
                       SHEET IN ARRAY UMWANDELN
                    --------------------------------- */

                    const rows =
                        XLSX
                        .utils
                        .sheet_to_json(
                            sheet
                        );


                    if (
                        !rows ||
                        rows.length === 0
                    ) {

                        alert(
                            'Das Sheet "DMacros" ist leer.'
                        );

                        return;

                    }


                    /* ---------------------------------
                       EXCEL DATEN ÜBERNEHMEN

                       Erwartete Spalten:

                       ID
                       Food
                       Energy
                       Fat
                       SFA
                       Carbs
                       Sugar
                       Fiber
                       Protein
                    --------------------------------- */

                    food =
                        rows.map(
                            function (row) {

                                return {

                                    ID:
                                        Number(
                                            row.ID || 0
                                        ),

                                    Food:
                                        String(
                                            row.Food || ""
                                        ),

                                    Energy:
                                        Number(
                                            row.Energy || 0
                                        ),

                                    Fat:
                                        Number(
                                            row.Fat || 0
                                        ),

                                    SFA:
                                        Number(
                                            row.SFA || 0
                                        ),

                                    Carbs:
                                        Number(
                                            row.Carbs || 0
                                        ),

                                    Sugar:
                                        Number(
                                            row.Sugar || 0
                                        ),

                                    Fiber:
                                        Number(
                                            row.Fiber || 0
                                        ),

                                    Protein:
                                        Number(
                                            row.Protein || 0
                                        )

                                };

                            }
                        );


                    /* ---------------------------------
                       AUSWAHL ZURÜCKSETZEN
                    --------------------------------- */

                    selectedFood =
                        null;


                    /* ---------------------------------
                       FOOD LISTE NEU ZEIGEN
                    --------------------------------- */

                    renderFood();


                    alert(
                        food.length +
                        " Lebensmittel erfolgreich importiert."
                    );


                }
                catch (error) {


                    alert(
                        "Excel Import Fehler: " +
                        error.message
                    );


                }

            };


        reader.readAsArrayBuffer(
            file
        );


        /* ---------------------------------
           INPUT ZURÜCKSETZEN

           Dadurch kann dieselbe Excel-Datei
           später erneut importiert werden.
        --------------------------------- */

        this.value = "";


    }
);


/* =====================================================
   FOOD LISTE RENDERN
===================================================== */

function renderFood() {


    const list =
        document
        .getElementById(
            "foodList"
        );


    const filter =
        document
        .getElementById(
            "filter"
        )
        .value
        .toLowerCase();


    /* ---------------------------------
       FOOD FILTERN
    --------------------------------- */

    const filtered =
        food.filter(
            function (item) {

                return item.Food
                    .toLowerCase()
                    .includes(
                        filter
                    );

            }
        );


    /* ---------------------------------
       LISTE LEEREN
    --------------------------------- */

    list.innerHTML = "";


    /* ---------------------------------
       KEINE ERGEBNISSE
    --------------------------------- */

    if (
        filtered.length === 0
    ) {

        list.innerHTML =
            "<div>Keine Lebensmittel gefunden</div>";

        return;

    }


    /* ---------------------------------
       FOOD ANZEIGEN
    --------------------------------- */

    filtered.forEach(
        function (item) {


            const div =
                document
                .createElement(
                    "div"
                );


            div.className =
                "food-item";


            /* ---------------------------------
               AUSGEWÄHLTES FOOD MARKIEREN
            --------------------------------- */

            if (
                selectedFood === item
            ) {

                div.classList.add(
                    "selected"
                );

            }


            div.innerHTML = `

                <span>
                    ${item.Food}
                </span>

                <span class="food-energy">
                    ${item.Energy} kcal
                </span>

            `;


            /* ---------------------------------
               FOOD AUSWÄHLEN
            --------------------------------- */

            div.onclick =
                function () {


                    selectedFood =
                        item;


                    renderFood();


                };


            list.appendChild(
                div
            );


        }
    );

}


/* =====================================================
   FILTER
===================================================== */

document
.getElementById("filter")
.addEventListener(
    "input",
    renderFood
);


/* =====================================================
   TRACK FOOD
===================================================== */

document
.getElementById("trackBtn")
.addEventListener(
    "click",
    function () {


        /* ---------------------------------
           PRÜFEN OB FOOD AUSGEWÄHLT
        --------------------------------- */

        if (
            !selectedFood
        ) {

            alert(
                "Bitte zuerst ein Lebensmittel auswählen."
            );

            return;

        }


        /* ---------------------------------
           MENGE EINGEBEN
        --------------------------------- */

        const input =
            prompt(
                "Menge in Gramm:",
                "100"
            );


        if (
            input === null
        ) {

            return;

        }


        const grams =
            parseFloat(
                input
            );


        /* ---------------------------------
           MENGE PRÜFEN
        --------------------------------- */

        if (
            isNaN(grams) ||
            grams <= 0
        ) {

            alert(
                "Bitte eine gültige Menge eingeben."
            );

            return;

        }


        /* ---------------------------------
           FAKTOR BERECHNEN

           Excel-Werte sind pro 100 g

           Beispiel:

           200 g = Faktor 2
           50 g  = Faktor 0.5
        --------------------------------- */

        const factor =
            grams / 100;


        /* ---------------------------------
           TRACKED FOOD ERSTELLEN
        --------------------------------- */

        const trackedFood = {


            ID:
                selectedFood.ID,


            Food:
                selectedFood.Food,


            Grams:
                grams,


            Energy:
                selectedFood.Energy *
                factor,


            Fat:
                selectedFood.Fat *
                factor,


            SFA:
                selectedFood.SFA *
                factor,


            Carbs:
                selectedFood.Carbs *
                factor,


            Sugar:
                selectedFood.Sugar *
                factor,


            Fiber:
                selectedFood.Fiber *
                factor,


            Protein:
                selectedFood.Protein *
                factor


        };


        /* ---------------------------------
           TRACKED FOOD SPEICHERN
        --------------------------------- */

        tracked.push(
            trackedFood
        );


        saveTracked();


        /* ---------------------------------
           ANZEIGE AKTUALISIEREN
        --------------------------------- */

        renderTracked();

        renderReport();


    }
);


/* =====================================================
   TRACKED FOOD RENDERN
===================================================== */

function renderTracked() {


    const list =
        document
        .getElementById(
            "trackedList"
        );


    list.innerHTML = "";


    /* ---------------------------------
       KEINE TRACKED FOODS
    --------------------------------- */

    if (
        tracked.length === 0
    ) {

        list.innerHTML =
            "<div>Noch keine Lebensmittel getrackt</div>";

        return;

    }


    /* ---------------------------------
       TRACKED FOODS ANZEIGEN
    --------------------------------- */

    tracked.forEach(
        function (
            item,
            index
        ) {


            const div =
                document
                .createElement(
                    "div"
                );


            div.className =
                "tracked-item";


            div.innerHTML = `

                <span>
                    ${item.Food}
                    (${item.Grams} g)
                </span>

                <button
                    class="remove"
                    onclick="removeTracked(${index})"
                >
                    ×
                </button>

            `;


            list.appendChild(
                div
            );


        }
    );

}


/* =====================================================
   TRACKED FOOD LÖSCHEN
===================================================== */

function removeTracked(
    index
) {


    tracked.splice(
        index,
        1
    );


    saveTracked();


    renderTracked();

    renderReport();


}


/* =====================================================
   TRACKED FOOD SPEICHERN
===================================================== */

function saveTracked() {


    localStorage.setItem(

        "trackedFood",

        JSON.stringify(
            tracked
        )

    );

}


/* =====================================================
   MACRO REPORT
===================================================== */

function renderReport() {


    /* ---------------------------------
       SUMMEN
    --------------------------------- */

    let total = {


        Energy: 0,


        Fat: 0,


        SFA: 0,


        Carbs: 0,


        Sugar: 0,


        Fiber: 0,


        Protein: 0


    };


    /* ---------------------------------
       ALLE TRACKED FOODS ADDIEREN
    --------------------------------- */

    tracked.forEach(
        function (item) {


            total.Energy +=
                item.Energy || 0;


            total.Fat +=
                item.Fat || 0;


            total.SFA +=
                item.SFA || 0;


            total.Carbs +=
                item.Carbs || 0;


            total.Sugar +=
                item.Sugar || 0;


            total.Fiber +=
                item.Fiber || 0;


            total.Protein +=
                item.Protein || 0;


        }
    );


    /* ---------------------------------
       REPORT ANZEIGEN
    --------------------------------- */

    document
    .getElementById(
        "energy"
    )
    .textContent =

        Math.round(
            total.Energy
        ) +

        " kcal";


    document
    .getElementById(
        "fat"
    )
    .textContent =

        total.Fat.toFixed(
            1
        ) +

        " g";


    document
    .getElementById(
        "sfa"
    )
    .textContent =

        total.SFA.toFixed(
            1
        ) +

        " g";


    document
    .getElementById(
        "carbs"
    )
    .textContent =

        total.Carbs.toFixed(
            1
        ) +

        " g";


    document
    .getElementById(
        "sugar"
    )
    .textContent =

        total.Sugar.toFixed(
            1
        ) +

        " g";


    document
    .getElementById(
        "fiber"
    )
    .textContent =

        total.Fiber.toFixed(
            1
        ) +

        " g";


    document
    .getElementById(
        "protein"
    )
    .textContent =

        total.Protein.toFixed(
            1
        ) +

        " g";


}


/* =====================================================
   CLEAR CASH

   LÖSCHT ALLE LOKAL GESPEICHERTEN DATEN
===================================================== */

document
.getElementById(
    "clearBtn"
)
.addEventListener(
    "click",
    function () {


        const confirmDelete =
            confirm(
                "Soll der gesamte lokale App-Cache gelöscht werden?"
            );


        if (
            !confirmDelete
        ) {

            return;

        }


        /* ---------------------------------
           LOCAL STORAGE LÖSCHEN
        --------------------------------- */

        localStorage.clear();


        /* ---------------------------------
           TRACKED FOOD LEEREN
        --------------------------------- */

        tracked = [];


        /* ---------------------------------
           FOOD DATENBANK LEEREN
        --------------------------------- */

        food = [];


        /* ---------------------------------
           AUSWAHL ENTFERNEN
        --------------------------------- */

        selectedFood =
            null;


        /* ---------------------------------
           ANZEIGEN AKTUALISIEREN
        --------------------------------- */

        renderFood();

        renderTracked();

        renderReport();


    }
);


/* =====================================================
   INITIALISIERUNG
===================================================== */

renderFood();

renderTracked();

renderReport();


/* =====================================================
   SERVICE WORKER
===================================================== */

if (
    "serviceWorker"
    in navigator
) {


    navigator
    .serviceWorker
    .register(
        "./sw.js"
    );


}

</script>


</body>

</html>
