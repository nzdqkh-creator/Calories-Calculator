<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

<title>Calorie Calculator</title>

<link rel="manifest" href="manifest.json">

<style>
* {
    box-sizing: border-box;
    font-family: system-ui;
}

body {
    margin: 0;
    padding: 15px;
    background: #f1f5f9;
}

.app {
    max-width: 420px;
    margin: auto;
}

button,
input {
    width: 100%;
    padding: 13px;
    margin-bottom: 10px;
    border: 0;
    border-radius: 12px;
    font-size: 16px;
}

button {
    background: #3b82f6;
    color: white;
    font-weight: 600;
}

.clear {
    background: #ef4444;
}

input {
    background: white;
}

.list {
    background: white;
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 15px;
}

.item {
    padding: 13px;
    border-bottom: 1px solid #eee;
    cursor: pointer;
}

.item:last-child {
    border-bottom: 0;
}

.section {
    margin-top: 20px;
    font-weight: 700;
}

.macro {
    display: flex;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid #ddd;
}

.tracked {
    display: flex;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid #ddd;
}

.delete {
    width: auto;
    padding: 3px 8px;
    margin: 0;
    background: none;
    color: #ef4444;
}
</style>
</head>

<body>

<div class="app">

    <button id="importBtn">
        Import Excel
    </button>

    <input
        type="file"
        id="fileInput"
        accept=".xlsx,.xls"
        hidden
    >

    <input
        type="text"
        id="filter"
        placeholder="Food suchen..."
    >

    <div id="foodList" class="list"></div>

    <div class="section">
        Macros
    </div>

    <div id="macros"></div>

    <div class="section">
        Getrackt
    </div>

    <div id="tracked"></div>

    <button id="clearBtn" class="clear">
        Alle löschen
    </button>

</div>

<script src="xlsx.full.min.js"></script>

<script>

const defaultFood = [
    {
        Food: "Apfel",
        Energy: 52,
        Fat: 0.2,
        SFA: 0,
        Carb: 14,
        Sugar: 10,
        Fiber: 2.4,
        Protein: 0.3
    },
    {
        Food: "Banane",
        Energy: 89,
        Fat: 0.3,
        SFA: 0.1,
        Carb: 23,
        Sugar: 12,
        Fiber: 2.6,
        Protein: 1.1
    },
    {
        Food: "Vollkornbrot",
        Energy: 265,
        Fat: 4.2,
        SFA: 0.6,
        Carb: 43,
        Sugar: 5,
        Fiber: 7,
        Protein: 9
    },
    {
        Food: "Hähnchenbrust",
        Energy: 165,
        Fat: 3.6,
        SFA: 1,
        Carb: 0,
        Sugar: 0,
        Fiber: 0,
        Protein: 31
    }
];

let food = defaultFood;
let tracked = JSON.parse(
    localStorage.getItem("tracked") || "[]"
);

const filter = document.getElementById("filter");
const foodList = document.getElementById("foodList");
const macros = document.getElementById("macros");
const trackedList = document.getElementById("tracked");


// FOOD LISTE
function renderFood() {

    const search = filter.value.toLowerCase();

    const result = food.filter(x =>
        String(x.Food)
        .toLowerCase()
        .includes(search)
    );

    foodList.innerHTML = result.map((x, i) => `
        <div class="item"
             onclick="trackFood(${food.indexOf(x)})">

            ${x.Food}

        </div>
    `).join("");

}


// FOOD TRACKEN
function trackFood(index) {

    const item = food[index];

    const amount = prompt(
        "Menge in Gramm:",
        "100"
    );

    if (!amount) return;

    const grams = Number(amount);

    if (!grams || grams <= 0) return;

    const factor = grams / 100;

    tracked.push({

        Food: item.Food,

        Amount: grams,

        Energy: item.Energy * factor,
        Fat: item.Fat * factor,
        SFA: item.SFA * factor,
        Carb: item.Carb * factor,
        Sugar: item.Sugar * factor,
        Fiber: item.Fiber * factor,
        Protein: item.Protein * factor

    });

    save();

    renderTracked();
    renderMacros();
}


// MACROS
function renderMacros() {

    const total = {

        Energy: 0,
        Fat: 0,
        SFA: 0,
        Carb: 0,
        Sugar: 0,
        Fiber: 0,
        Protein: 0

    };

    tracked.forEach(x => {

        Object.keys(total).forEach(key => {

            total[key] += Number(x[key]) || 0;

        });

    });

    macros.innerHTML = Object.entries(total)
        .map(([key, value]) => `

            <div class="macro">

                <span>${key}</span>

                <span>
                    ${value.toFixed(1)}
                    ${key === "Energy" ? "kcal" : "g"}
                </span>

            </div>

        `)
        .join("");

}


// GETRACKTE FOODS
function renderTracked() {

    trackedList.innerHTML = tracked.map((x, i) => `

        <div class="tracked">

            <span>
                ${x.Food}
                (${x.Amount} g)
            </span>

            <button
                class="delete"
                onclick="removeTracked(${i})">
                ✕
            </button>

        </div>

    `).join("");

}


// EINZELNES FOOD LÖSCHEN
function removeTracked(index) {

    tracked.splice(index, 1);

    save();

    renderTracked();
    renderMacros();

}


// ALLES LÖSCHEN
document.getElementById("clearBtn")
.onclick = function() {

    if (confirm("Alle getrackten Foods löschen?")) {

        tracked = [];

        save();

        renderTracked();
        renderMacros();

    }

};


// EXCEL IMPORT
document.getElementById("importBtn")
.onclick = function() {

    document
        .getElementById("fileInput")
        .click();

};


document.getElementById("fileInput")
.onchange = function(event) {

    const file = event.target.files[0];

    if (!file) return;

    const reader = new FileReader();

    reader.onload = function(e) {

        const workbook = XLSX.read(
            e.target.result,
            { type: "array" }
        );

        const sheet =
            workbook.Sheets[
                workbook.SheetNames[0]
            ];

        food = XLSX.utils.sheet_to_json(sheet);

        renderFood();

    };

    reader.readAsArrayBuffer(file);

};


// FILTER
filter.oninput = renderFood;


// SPEICHERN
function save() {

    localStorage.setItem(
        "tracked",
        JSON.stringify(tracked)
    );

}


// START
renderFood();
renderTracked();
renderMacros();

</script>

<script>

if ("serviceWorker" in navigator) {

    navigator.serviceWorker.register(
        "./sw.js"
    );

}

</script>

</body>
</html>
