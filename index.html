<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Calorie Calculator</title>

<link rel="manifest" href="manifest.json">

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    padding: 15px;
    font-family: system-ui, sans-serif;
    background: #f1f5f9;
}

.app {
    max-width: 420px;
    margin: auto;
}

button,
input {
    width: 100%;
    padding: 12px;
    margin-bottom: 8px;
    border: 0;
    border-radius: 12px;
    font-size: 16px;
}

button {
    background: #3b82f6;
    color: white;
    font-weight: bold;
}

#clearCache {
    background: #ef4444;
}

.list {
    background: white;
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 10px;
}

.item {
    padding: 12px;
    border-bottom: 1px solid #eee;
    cursor: pointer;
}

.item:last-child {
    border-bottom: 0;
}

.item:active {
    background: #e5e7eb;
}

.report {
    background: white;
    padding: 12px;
    border-radius: 12px;
    margin-bottom: 10px;
}

.tracked {
    background: white;
    border-radius: 12px;
    overflow: hidden;
}

.tracked-item {
    padding: 12px;
    border-bottom: 1px solid #eee;
    display: flex;
    justify-content: space-between;
}

h1 {
    font-size: 22px;
}

h2 {
    font-size: 17px;
}
</style>
</head>

<body>

<div class="app">

<h1>Calorie Calculator</h1>

<button id="importExcel">
    Excel importieren
</button>

<input
    type="file"
    id="fileInput"
    accept=".xlsx,.xls"
    hidden
>

<input
    type="text"
    id="filter"
    placeholder="Food suchen..."
>

<h2>Food</h2>

<div class="list" id="foodList"></div>

<div class="report">
    <b>Bericht</b>
    <div id="report">
        0 Einträge · 0 kcal
    </div>
</div>

<h2>Getrackt</h2>

<div class="tracked" id="trackedList"></div>

<br>

<button id="clearCache">
    Cache löschen
</button>

</div>


<script src="xlsx.full.min.js"></script>

<script>

const defaultFood = [

{
    Food: "Apfel",
    Energie: 52,
    Fat: 0.2,
    Carb: 14,
    Protein: 0.3
},

{
    Food: "Banane",
    Energie: 89,
    Fat: 0.3,
    Carb: 23,
    Protein: 1.1
},

{
    Food: "Vollkornbrot",
    Energie: 265,
    Fat: 4.2,
    Carb: 43,
    Protein: 9
},

{
    Food: "Hähnchenbrust",
    Energie: 165,
    Fat: 3.6,
    Carb: 0,
    Protein: 31
},

{
    Food: "Reis",
    Energie: 130,
    Fat: 0.3,
    Carb: 28,
    Protein: 2.7
},

{
    Food: "Olivenöl",
    Energie: 884,
    Fat: 100,
    Carb: 0,
    Protein: 0
}

];


let food = [...defaultFood];

let tracked = [];

let selectedFood = null;


const foodList =
    document.getElementById("foodList");

const trackedList =
    document.getElementById("trackedList");

const filter =
    document.getElementById("filter");

const report =
    document.getElementById("report");

const fileInput =
    document.getElementById("fileInput");


/* -------------------------
   FOOD LISTE
------------------------- */

function renderFood() {

    const search =
        filter.value.toLowerCase();

    const result =
        food.filter(x =>
            String(x.Food)
            .toLowerCase()
            .includes(search)
        );

    if (!result.length) {

        foodList.innerHTML =
            "<div class='item'>Keine Ergebnisse</div>";

        return;
    }


    foodList.innerHTML =
        result.map((x, i) => `

        <div
            class="item"
            data-index="${i}"
        >
            <b>${x.Food}</b>
            <br>
            ${x.Energie} kcal / 100 g
        </div>

        `).join("");


    document
        .querySelectorAll(".item[data-index]")
        .forEach(item => {

            item.onclick = () => {

                const index =
                    Number(item.dataset.index);

                selectedFood =
                    result[index];

                trackFood();

            };

        });

}


/* -------------------------
   FOOD TRACKEN
------------------------- */

function trackFood() {

    if (!selectedFood)
        return;


    const amount =
        prompt(
            "Menge in Gramm:",
            "100"
        );


    if (amount === null)
        return;


    const grams =
        Number(amount);


    if (!grams || grams <= 0)
        return;


    const factor =
        grams / 100;


    tracked.push({

        Food:
            selectedFood.Food,

        Menge:
            grams,

        kcal:
            selectedFood.Energie *
            factor,

        Fat:
            selectedFood.Fat *
            factor,

        Carb:
            selectedFood.Carb *
            factor,

        Protein:
            selectedFood.Protein *
            factor

    });


    save();

    renderTracked();

}


/* -------------------------
   GETRACKTE FOOD
------------------------- */

function renderTracked() {

    if (!tracked.length) {

        trackedList.innerHTML =
            "<div class='tracked-item'>Keine Einträge</div>";

        updateReport();

        return;
    }


    trackedList.innerHTML =

        tracked.map((x, i) => `

        <div class="tracked-item">

            <span>
                ${x.Food}
                <br>
                ${x.Menge} g
            </span>

            <span>

                ${Math.round(x.kcal)} kcal

                <button
                    onclick="removeFood(${i})"
                    style="
                    width:auto;
                    padding:5px 10px;
                    margin-left:8px;
                    background:#ef4444;
                    "
                >
                    X
                </button>

            </span>

        </div>

        `).join("");


    updateReport();

}


/* -------------------------
   FOOD LÖSCHEN
------------------------- */

function removeFood(index) {

    tracked.splice(index, 1);

    save();

    renderTracked();

}


/* -------------------------
   BERICHT
------------------------- */

function updateReport() {

    let kcal = 0;

    tracked.forEach(x => {

        kcal += x.kcal;

    });


    report.innerHTML =

        tracked.length +
        " Einträge · " +
        Math.round(kcal) +
        " kcal";

}


/* -------------------------
   EXCEL IMPORT
------------------------- */

document
.getElementById("importExcel")
.onclick = () => {

    fileInput.click();

};


fileInput.onchange = function () {

    const file =
        this.files[0];

    if (!file)
        return;


    const reader =
        new FileReader();


    reader.onload = function(e) {

        const workbook =
            XLSX.read(
                new Uint8Array(
                    e.target.result
                ),
                {
                    type: "array"
                }
            );


        const sheet =
            workbook.Sheets[
                workbook.SheetNames[0]
            ];


        food =
            XLSX.utils.sheet_to_json(
                sheet
            );


        localStorage.setItem(
            "food",
            JSON.stringify(food)
        );


        renderFood();

    };


    reader.readAsArrayBuffer(file);

};


/* -------------------------
   SUCHE
------------------------- */

filter.oninput =
    renderFood;


/* -------------------------
   SPEICHERN
------------------------- */

function save() {

    localStorage.setItem(
        "tracked",
        JSON.stringify(tracked)
    );

}


/* -------------------------
   DATEN LADEN
------------------------- */

try {

    const savedFood =
        localStorage.getItem("food");

    if (savedFood) {

        food =
            JSON.parse(savedFood);

    }


    const savedTracked =
        localStorage.getItem("tracked");

    if (savedTracked) {

        tracked =
            JSON.parse(savedTracked);

    }

}
catch(e) {}


/* -------------------------
   CACHE LÖSCHEN
------------------------- */

document
.getElementById("clearCache")
.onclick = async () => {

    localStorage.clear();


    if ("caches" in window) {

        const cachesList =
            await caches.keys();

        for (const cache of cachesList) {

            await caches.delete(cache);

        }

    }


    location.reload();

};


/* -------------------------
   START
------------------------- */

renderFood();

renderTracked();


/* -------------------------
   SERVICE WORKER
------------------------- */

if ("serviceWorker" in navigator) {

    navigator.serviceWorker.register(
        "sw.js"
    );

}

</script>

</body>
</html>
